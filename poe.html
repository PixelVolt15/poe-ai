<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PoE AI</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
}

#chat {
    width: 60%;
    height: 400px;
    margin: auto;
    background: #1e293b;
    padding: 10px;
    overflow-y: auto;
    border-radius: 10px;
}

.mensaje {
    background: #22c55e;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    text-align: right;
}

.respuesta {
    background: #3b82f6;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    text-align: left;
}

input {
    width: 60%;
    padding: 10px;
    margin-top: 10px;
}

button {
    padding: 10px;
    margin: 5px;
}
</style>
</head>

<body>

<h1>🤖 PoE AI</h1>

<div id="chat"></div>

<input id="input" placeholder="Escribe algo...">
<br>

<button onclick="enviar()">Enviar</button>
<button onclick="reiniciar()">Reiniciar</button>

<script>
function agregarMensaje(texto, tipo) {
    let chat = document.getElementById("chat");

    let div = document.createElement("div");
    div.className = tipo;
    div.textContent = texto;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function enviar() {
    let input = document.getElementById("input");
    let mensaje = input.value;

    if (mensaje === "") return;

    agregarMensaje("Tú: " + mensaje, "mensaje");

    fetch("http://127.0.0.1:5000/chat", {
        method: "POST",
        mode: "cors",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            mensaje: mensaje
        })
    })
    .then(response => response.json())
    .then(data => {
        agregarMensaje("IA: " + data.respuesta, "respuesta");
    })
    .catch(error => {
        console.error(error);
        agregarMensaje("Error conectando 😢", "respuesta");
    });

    input.value = "";
}

function reiniciar() {
    document.getElementById("chat").innerHTML = "";
}
</script>

</body>
</html>
